<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Tap 'N' Track</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
  <script src="/bootstrap/js/bootstrap.js"></script>
</head>

<body>
  <div class="container">
    <div th:replace="fragments/header"></div>
    
    <h1 class="mt-4 mb-4">Rewards</h1>

    <div class="mt-3 mb-3">
      <a th:href="@{/rewards/add}" class="btn btn-primary">Add Reward</a>
    </div>

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Rewards</th>
          <th>Points Required</th>
          <th>Quantity</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="rewards : ${listRewards}">
          <td>
            <span th:text="${rewards.description}"></span><br>
            <img th:src="@{'/uploads/rewards/' + ${rewards.rewardsId} + '/' + ${rewards.imgName}}"
              width="20%">
          </td>
          <td th:text="${rewards.pointsRequired + ' points'}"></td>
          <td th:text="${rewards.quantity}"></td>
          <td>
            <a th:href="@{/rewards/edit/{rewardsId}(rewardsId=${rewards.rewardsId})}" class="btn btn-warning">Edit Reward</a>
            <form th:action="@{/rewards/delete/{rewardsId}(rewardsId=${rewards.rewardsId})}" method="post" style="display: inline;">
              <button type="submit" class="btn btn-danger">Delete Reward</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>

</html>
