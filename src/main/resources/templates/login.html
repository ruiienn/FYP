<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tap 'N' Track - View Members</title>
    <link rel="icon" type="images/png" href="/images/logo.png">
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
</head>

	<div th:replace="fragments/style"></div>

	<!-- !PAGE CONTENT! -->
	<main style="margin-top: 170px;">
		<form class="col-5" th:action="@{/login}" method="post">
			<h1>Please Login</h1>
			<div th:if="${param.error}" class="alert alert-danger">Invalid
				username and password.</div>
			<div th:if="${param.logout}" class="alert alert-success">You
				have been logged out.</div>
			<label for="username" class="form-label">Username</label> <input
				type="text" class="form-control" id="username" name="username" /> <label
				for="password" class="form-label">Password</label> <input
				type="password" class="form-control" id="password" name="password" />
			<div class="mt-3">
				<button type="submit" class="btn btn-primary">Log in</button>
			</div>

		</form>	

	</main>
