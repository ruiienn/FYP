<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leaderboard</title>
<link rel="icon" type="image/png" href="/images/nfc.png">
<link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
<script src="/bootstrap/js/bootstrap.js"></script>
</head>
<body>
	<div th:replace="fragments/style"></div>
	<div th:replace="fragments/index_style"></div>
	<div class="container">
		<div class="tnt">
			<i> Leaderboard <img src="/images/leaderboard.png"
				class="tnt-icon"></i>
			<!-- Leaderboard Entries -->
			<div id="overflow">
				<div th:each="member, iterStat : ${topMembers}">
					<div
						th:class="${iterStat.index == 0 ? 'first' : (iterStat.index == 1 ? 'second' : (iterStat.index == 2 ? 'third' : 'other'))}">
						<!-- Trophy Icons for Top 3 -->
						<img th:if="${iterStat.index < 3}"
							th:src="@{/images/{rank}.png(rank=${iterStat.index + 1})}"
							class="icon">
						<!-- Default Rank Icon for Others -->
						<img th:if="${iterStat.index >= 3}" src="/images/profile.png"
							class="pfp">
						<p th:text="${member.name}">Username</p>
						<p>
							<span th:text="${member.points}">0</span> <img
								src="/images/point.png" class="icon">
						</p>
					</div>
					<!-- For Members Beyond Top 3 -->
					<div class="other" th:if="${iterStat.index >= 3}">
						<span class="placing" th:text="${iterStat.index + 1}">4</span> <img
							src="/images/profile.png" class="pfp">
						<div class="details">
							<span class="username" th:text="${member.name}">Username</span>
							<div class="score">
								<span th:text="${member.points}">100</span> <img
									src="/images/point.png" class="icon">
							</div>
						</div>
					</div>
				</div>
				<!-- No Members Message -->
				<div th:if="${#lists.isEmpty(topMembers)}">
					<p>No members available for the leaderboard yet!</p>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
