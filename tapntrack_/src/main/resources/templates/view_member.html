<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Members</title>
<link rel="icon" type="image/png" href="/images/nfc.png">
<link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
<script src="/bootstrap/js/bootstrap.js"></script>
<style>
.search {
	width: 80%;
	margin: 20px auto;
	padding: 10px;
	border: 1px solid black;
	border-radius: 10px;
	display: block;
	text-align: center;
}
</style>
</head>
<body>
	<div th:replace="fragments/style"></div>
	<div class="container">
		<div class="tnt">
			<i> Members <img src="/images/member.png" class="tnt-icon"></i>
			<div class="alert alert-primary" role="alert" th:text="${success}"
				th:if="${success}"></div>
			<!-- Add Member Button -->
			<div class="text-center">
				<a href="/members/add" class="btn-add">Add Member</a>
			</div>
			<!-- Search functionality -->
			<input type="text" class="search"
				placeholder="Search Member by Username" id="filterInput">
			<div id="overflow">
				<div class="tnt-row">
					<div class="card" th:each="member : ${listMembers}">
						<!--	<img
							th:src="@{'/uploads/members/' + ${member.id} + '/' + ${member.imagesName}}"
							class="card-img-top">
						 	<p class="card-text">
							Name: <span th:text="${member.name}"></span>
						</p>
					 -->
						<p class="card-text">
							<img th:src="${member.avatar}" alt="Avatar" class="card-img" />
						</p>
						<p class="card-text">
							Role: <span th:text="${member.role}"></span>
						</p>
						<p class="card-text">
							Email: <span th:text="${member.email}"></span>
						</p>
						<p class="card-text">
							Username: <span class="username" th:text="${member.username}"></span>
						</p>



						<p class="card-text">
							Points: <span th:text="${member.points}"></span> <img
								src="/images/point.png" class="icon">
						</p>
						<div class="end">
							<a th:href="@{/members/edit/{id}(id=${member.id})}" class="link">Edit</a>
							| <a th:href="@{/members/delete/{id}(id=${member.id})}"
								class="link">Delete</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- Search button JavaScript -->
	<script>
	function filterCards() {
	    const input = document.getElementById("filterInput");
	    const filter = input.value.toUpperCase();
	    const cards = document.querySelectorAll(".card");

	    cards.forEach((card) => {
	        const usernameElement = card.querySelector(".username");
	        const username = usernameElement ? usernameElement.textContent || usernameElement.innerText : "";

	        console.log(username); // Debug log to verify username

	        if (username.toUpperCase().includes(filter)) {
	            card.style.display = ""; // Show card
	        } else {
	            card.style.display = "none"; // Hide card
	        }
	    });
	}

	document.addEventListener("DOMContentLoaded", function() {
	    document.getElementById("filterInput").addEventListener("input", filterCards);
	});





</script>

</body>
</html>
